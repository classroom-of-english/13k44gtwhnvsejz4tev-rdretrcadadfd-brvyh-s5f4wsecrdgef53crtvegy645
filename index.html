<!DOCTYPE html>
<html>
<head>
  <title>小型浏览器</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 800px;
      height: 600px;
      margin: 0 auto;
      border: 1px solid #ccc;
      padding: 10px;
    }
    #browser {
      width: 100%;
      height: 90%;
      border: 1px solid #ccc;
      padding: 10px;
      overflow: auto;
    }
    #address-bar {
      width: 100%;
      height: 10%;
      border: 1px solid #ccc;
      padding: 10px;
    }
    #back-button {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #ccc;
      border: none;
      padding: 5px;
      cursor: pointer;
    }
    #forward-button {
      position: absolute;
      top: 10px;
      left: 60px;
      background-color: #ccc;
      border: none;
      padding: 5px;
      cursor: pointer;
    }
    #bookmark-button {
      position: absolute;
      top: 10px;
      left: 110px;
      background-color: #ccc;
      border: none;
      padding: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>小型浏览器</h1>
  <div id="address-bar">
    <input id="url" type="text" placeholder="请输入URL">
    <button id="go">打开</button>
    <button id="back-button">后退</button>
    <button id="forward-button">前进</button>
    <button id="bookmark-button">书签</button>
  </div>
  <div id="browser">
    <iframe id="iframe" width="100%" height="100%"></iframe>
  </div>
  <div id="bookmark-list">
    <h2>书签</h2>
    <ul id="bookmark-ul"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
